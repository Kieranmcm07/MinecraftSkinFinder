<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Skin Viewer</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      href="https://www.example.com/favicon.png"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="title">MINECRAFT SKIN VIEWER</h1>
        <div class="search-box">
          <input
            type="text"
            id="username"
            placeholder="Enter username..."
            class="minecraft-input"
          />
          <button onclick="loadSkin()" class="minecraft-btn">VIEW SKIN</button>
        </div>
      </header>

      <main class="skin-viewer">
        <div id="skin-container">
          <img
            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
            id="skin-image"
            class="skin-image"
            alt="Minecraft Skin"
            onerror="showErrorState()"
          />
          <div id="error-message" class="error-box hidden">
            <div class="error-icon">⚠️</div>
            <h2>SKIN NOT FOUND</h2>
            <p>The image you're trying to request does not exist</p>
            <p class="signature">- Kieran's Skin Viewer -</p>
          </div>
        </div>

        <div class="skin-info">
          <div class="info-box">
            <h3>🛠️ Created by Kieran</h3>
            <p>🔍 Search any Minecraft username</p>
            <p>🔄 Toggle between 3D views</p>
            <p>⏬ Download HD skin files</p>
          </div>
          <div class="action-buttons">
            <button onclick="toggleModel()" class="minecraft-btn model-btn">
              TOGGLE MODEL
            </button>
            <a id="download-link" class="minecraft-btn download-btn hidden"
              >DOWNLOAD SKIN</a
            >
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
