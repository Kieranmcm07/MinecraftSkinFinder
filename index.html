<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kieran's Skin Viewer</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/zK3iW3R.png" />
  </head>
  <body>
    <div class="particles" id="particles"></div>
    <div id="enderman" class="enderman-hidden"></div>

    <header class="header">
      <h1 class="logo neon-text">SKIN VIEWER</h1>
      <div class="search-container">
        <input
          type="text"
          id="username"
          placeholder="🔍 Enter Username"
          class="glow-input"
        />
        <button onclick="getSkin()" class="glow-btn">VIEW SKIN</button>
      </div>
    </header>

    <main class="main-content">
      <div class="skin-container" id="output">
        <div class="crystal-ball">
          <div class="inner-glow">
            <img id="skin-image" class="skin-image" />
          </div>
        </div>
        <div class="controls">
          <button onclick="toggleModel()" class="glow-btn model-btn">
            🔄 TOGGLE MODEL
          </button>
          <a id="download-btn" class="glow-btn download-btn hidden"
            >⬇️ DOWNLOAD SKIN</a
          >
        </div>
      </div>
    </main>

    <footer class="footer neon-text">
      <p>
        Created by <span class="kieran-name">Kieran</span> |
        <a href="https://github.com/yourgithub" target="_blank">GitHub</a>
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
