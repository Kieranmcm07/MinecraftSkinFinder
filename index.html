<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Skin Viewer</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/4EeQp3P.png" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="title">MINECRAFT SKIN VIEWER</h1>
        <div class="search-box">
          <input
            type="text"
            id="username"
            placeholder="Enter username..."
            class="minecraft-input"
          />
          <button onclick="loadSkin()" class="minecraft-btn">VIEW SKIN</button>
        </div>
      </header>

      <main class="skin-viewer">
        <div id="skin-container">
          <img
            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
            id="skin-image"
            class="skin-image"
            alt="Minecraft Skin"
          />
          <div id="error-message" class="error-box hidden">
            <div class="error-icon">⚠️</div>
            <h2>ERROR</h2>
            <p>Error message here</p>
            <p class="signature">- Skin Viewer -</p>
          </div>
        </div>

        <div class="skin-info">
          <div class="info-box">
            <h3>
              🛠️ Created by
              <a
                href="https://github.com/KieranMc"
                target="_blank"
                class="github-link"
                >GitHub/KieranMc</a
              >
            </h3>
            <div class="skin-history" id="skin-history"></div>
            <p>🔍 Search any Minecraft username</p>
            <p>🔄 Toggle between 3D views</p>
            <p>⏬ Download HD skin files</p>
          </div>
          <div class="action-buttons">
            <button onclick="toggleModel()" class="minecraft-btn model-btn">
              TOGGLE MODEL
            </button>
            <a id="download-link" class="minecraft-btn download-btn hidden">
              DOWNLOAD SKIN
            </a>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
