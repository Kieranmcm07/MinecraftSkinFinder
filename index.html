<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Skin Viewer</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/png" href="https://i.imgur.com/4EeQp3P.png" />
  </head>
  <body>
    <div class="animated-bg">
      <div class="pixel-particle"></div>
      <div class="pixel-particle"></div>
      <div class="pixel-particle"></div>
    </div>

    <div class="container">
      <header class="header">
        <h1 class="title glow-text">MINECRAFT SKIN VIEWER</h1>
        <div class="search-box">
          <input
            type="text"
            id="username"
            placeholder="Enter username..."
            class="minecraft-input hover-glow"
          />
          <button onclick="loadSkin()" class="minecraft-btn hover-glow">
            <span class="btn-shine"></span>
            🔍 VIEW SKIN
          </button>
          <button onclick="randomSkin()" class="minecraft-btn hover-glow">
            <span class="btn-shine"></span>
            🎲 RANDOM
          </button>
        </div>
      </header>

      <main class="skin-viewer">
        <div id="skin-container">
          <div class="model-indicator" id="model-indicator"></div>
          <div class="skin-wrapper" id="skin-wrapper">
            <img
              src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
              id="skin-image"
              class="skin-image"
              alt="Minecraft Skin"
            />
          </div>
          <div id="error-message" class="error-box hidden">
            <div class="error-icon">⚠️</div>
            <h2>ERROR</h2>
            <p class="error-msg">Error message here</p>
            <p class="signature">- Skin Viewer -</p>
          </div>
        </div>

        <div class="skin-info">
          <div class="info-box pixel-box">
            <h3>
              🚀 Created by
              <a
                href="https://github.com/KieranMc"
                target="_blank"
                class="github-link glow-text"
                >GitHub: KieranMc</a
              >
            </h3>
            <div class="info-panel">
              <h4>💡 Pro Tip</h4>
              <p>Try these popular creators:</p>
              <div class="skin-history" id="skin-history"></div>
            </div>
          </div>
          <div class="action-buttons">
            <button
              onclick="toggleModel()"
              class="minecraft-btn model-btn hover-glow"
            >
              <span class="btn-shine"></span>
              🕹️ TOGGLE MODEL
            </button>
            <button id="3d-toggle" class="minecraft-btn hover-glow">
              <span class="btn-shine"></span>
              🎮 3D VIEWER
            </button>
            <a
              id="download-link"
              class="minecraft-btn download-btn hidden hover-glow"
            >
              <span class="btn-shine"></span>
              ⬇️ DOWNLOAD SKIN
            </a>
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
