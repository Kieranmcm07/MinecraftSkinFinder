<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Skin Viewer</title>
    <link href="https://fonts.cdnfonts.com/css/minecraft-4" rel="stylesheet" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      href="https://www.example.com/favicon.png"
    />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1 class="title">MINECRAFT SKIN VIEWER</h1>
        <div class="search-box">
          <input
            type="text"
            id="username"
            placeholder="Enter username..."
            class="minecraft-input"
          />
          <button onclick="loadSkin()" class="minecraft-btn">VIEW SKIN</button>
        </div>
      </header>

      <main class="skin-viewer">
        <div id="skin-container">
          <div class="model-indicator" id="model-indicator">
            Current Model: Classic
          </div>
          <img
            src="data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAQAAAC1HAwCAAAAC0lEQVR42mNkYAAAAAYAAjCB0C8AAAAASUVORK5CYII="
            id="skin-image"
            class="skin-image"
            alt="Minecraft Skin"
            onerror="showErrorState('Failed to load skin')"
          />
          <div id="error-message" class="error-box hidden">
            <div class="error-icon">⚠️</div>
            <h2>ERROR</h2>
            <p>Error message here</p>
            <p class="signature">- Skin Viewer -</p>
          </div>
        </div>

        <div class="skin-info">
          <div class="info-box">
            <h3>
              🛠️ Created by
              <a
                href="https://github.com/KieranMc"
                target="_blank"
                class="github-link"
                >Kieran</a
              >
            </h3>
            <div class="info-panel">
              <h4>ℹ️ How to Use</h4>
              <p>1. Enter any Minecraft username</p>
              <p>2. Click VIEW SKIN to load</p>
              <p>3. Toggle between Classic/Slim models</p>
              <p>4. Download HD skin file</p>
            </div>
          </div>
          <div class="action-buttons">
            <button onclick="toggleModel()" class="minecraft-btn model-btn">
              TOGGLE MODEL
            </button>
            <a id="download-link" class="minecraft-btn download-btn hidden"
              >DOWNLOAD SKIN</a
            >
          </div>
        </div>
      </main>
    </div>

    <script src="script.js"></script>
  </body>
</html>
