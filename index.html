<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minecraft Skin Viewer</title>
    <link rel="stylesheet" href="style.css" />
    <link
      rel="icon"
      type="image/png"
      href="https://raw.githubusercontent.com/yourusername/yourrepo/main/favicon.png"
    />
  </head>
  <body>
    <div class="particles" id="particles"></div>

    <header class="header">
      <h1 class="logo fade-in">Skin Viewer</h1>
      <div class="search-container fade-in delay-1">
        <input
          type="text"
          id="username"
          placeholder="Enter Minecraft Username"
        />
        <button onclick="getSkin()">View Skin</button>
      </div>
    </header>

    <main class="main-content">
      <div class="skin-container" id="output">
        <div class="loading">
          <div class="loading-spinner"></div>
          <p>Enter a username to view skin</p>
        </div>
      </div>
    </main>

    <footer class="footer fade-in delay-2">
      <p>
        Created by
        <a href="https://github.com/yourusername" target="_blank">Your Name</a>
      </p>
    </footer>

    <script src="script.js"></script>
  </body>
</html>
