<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Minecraft Skin Viewer</title>
  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      margin-top: 50px;
    }
    input {
      padding: 8px;
      font-size: 16px;
    }
    button {
      padding: 8px 12px;
      font-size: 16px;
      cursor: pointer;
    }
    img {
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <h1>Minecraft Skin Viewer</h1>
  <input id="username" placeholder="Enter Minecraft Username" />
  <button onclick="getSkin()">View Skin</button>
  <div id="output"></div>

  <script>
    async function getSkin() {
      const username = document.getElementById('username').value.trim();
      const output = document.getElementById('output');
      output.innerHTML = "Loading...";

      try {
        const res = await fetch(`https://api.mojang.com/users/profiles/minecraft/${username}`);
        if (!res.ok) throw new Error("Username not found.");
        const data = await res.json();
        const uuid = data.id;

        output.innerHTML = `
          <h2>${username}'s Skin</h2>
          <img src="https://crafatar.com/renders/body/${uuid}?size=512" alt="Skin" />
          <br><br>
          <img src="https://crafatar.com/avatars/${uuid}?size=100" alt="Avatar" />
        `;
      } catch (e) {
        output.innerHTML = `<p style="color: red;">Error: ${e.message}</p>`;
      }
    }
  </script>
</body>
</html>
